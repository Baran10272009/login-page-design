<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" type="text/css" href="../styles/style.css">
    <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <title>Log In Screen</title>
</head>
<body>
    <div class="blurred-background"></div>
    <div class="login-container">
        <header class="header">
            <nav class="navbar">
                <a href="#">About</a>
                <a href="#">News</a>
                <a href="#">Services</a>
                <a href="#">Contact</a>
            </nav>
            <form action="#" class="search-bar">
                <input type="text" placeholder="Search">
                <button type="submit"><i class='bxr  bx-search-alt'  ></i></button>
            </form>   
        </header>

        <br>

        <form class="user-container">
            <div class="left-container">
                <div class="left-container-items">
                    <i class='bxr  bx-plant-pot'  ></i>
                    <br>

                    <h2>Welcome!<br><span>To our new website.</span></h2>

                    <p>Insert Description Here.</p>

                    <div class="socials">
                        <a href="#"><img src="https://img.icons8.com/?size=30&id=16166&format=png&color=FFFFFF" alt="linkledin"></a>
                        <a href="#"><img src="https://img.icons8.com/?size=30&id=15979&format=png&color=FFFFFF" alt="youtube"></a>
                        <a href="#"><img src="https://img.icons8.com/?size=30&id=jlpBF1fJe9fs&format=png&color=FFFFFF" alt="twitter"></a>
                        <a href="#"><img src="https://img.icons8.com/?size=30&id=32320&format=png&color=FFFFFF" alt="instagram"></a>
                    </div>
                </div>
            </div>
            <div class="right-container">
                <div class="right-container-items">
                    <form class="sign-up-section">
                        <h1>Sign In</h1>
                        <br>
                        <i class='bxr  bx-envelope'  ></i><input class="email-input" placeholder=" Email" type="email"> 
                        <br>
                        <i class='bxr  bx-lock'  ></i><input class="password-input" placeholder=" Password" type="password">
                        <br>
                        <a href="#"><b>Forgot Password ?</b></a>
                        <br>
                        <button>Sign In</button>
                        <br>
                        <label>Don't have a acoount ? <a href="#"><b>Sign In</b></a></label>
                    </form>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
